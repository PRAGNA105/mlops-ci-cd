name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: python train.py

      - name: Run pytest
        run: pytest

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-api:latest .

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ml-api:latest

      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/ml-api:latest

      - name: Run Docker container
        run: docker run -d -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/ml-api:latest